max_results_per_keyword: 10
categories:
  - "cs.*"
site_url: "https://github.com/CathyQian/arxiv_assistant"

# Industry RSS/Atom feeds to ingest alongside arXiv papers.
# Items are stored in docs/industry.json (separate from docs/papers.json).
# Supported topic slugs: industry-blog, ads-tech, ml-engineering, llm,
#                        generative-ai, agentic-ai, mcp, vibe-coding, infra
# URLs marked (404/406) were verified broken and left commented out.
# Feeds with scrape_type: "anthropic" use an HTML listing-page scraper
# instead of RSS (Anthropic does not publish an RSS feed).

industry_feeds:
  # --- LLM / Generative AI ---
  - name: "OpenAI Blog"
    url: "https://openai.com/blog/rss.xml"
    max_items: 50
    topic: "llm"

  - name: "Anthropic Engineering"
    url: "https://www.anthropic.com/engineering"
    scrape_type: "anthropic"
    base_url: "https://www.anthropic.com"
    path_prefix: "/engineering/"
    max_items: 50
    topic: "agentic-ai"

  - name: "Anthropic Research"
    url: "https://www.anthropic.com/research"
    scrape_type: "anthropic"
    base_url: "https://www.anthropic.com"
    path_prefix: "/research/"
    max_items: 50
    topic: "llm"

  - name: "HuggingFace Blog"
    url: "https://huggingface.co/blog/feed.xml"
    max_items: 50
    topic: "llm"

  - name: "LangChain Blog"
    url: "https://blog.langchain.dev/rss/"
    max_items: 50
    topic: "agentic-ai"

  - name: "DeepMind Blog"
    url: "https://deepmind.google/blog/rss.xml"
    max_items: 50
    topic: "generative-ai"

  - name: "Google Research Blog"
    url: "https://blog.research.google/feeds/posts/default"
    max_items: 25
    topic: "industry-blog"

  # --- ML Engineering / Ads Tech ---
  - name: "Netflix Tech Blog"
    url: "https://netflixtechblog.com/feed"
    max_items: 10
    topic: "ml-engineering"

  - name: "Airbnb Engineering"
    url: "https://medium.com/feed/airbnb-engineering"
    max_items: 10
    topic: "ml-engineering"

  - name: "Pinterest Engineering"
    url: "https://medium.com/feed/pinterest-engineering"
    max_items: 10
    topic: "ads-tech"

# Broken feeds (as of last check):
#   Meta AI Blog       https://ai.meta.com/blog/rss/          → 404
#   Uber Engineering   https://www.uber.com/blog/engineering/rss/ → 406
#   Anthropic (no RSS) — using scrape_type: "anthropic" above instead

# Papers whose title or abstract contain any of these terms (case-insensitive)
# will be silently dropped before being added to the digest.
