name: Weekly Summarizer

on:
  schedule:
    - cron: '0 1 * * 6'  # Friday 9 PM ET = Saturday 01:00 UTC
  workflow_dispatch:       # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly summarizer
        run: python weekly_runner.py

      - name: Commit and push updated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Weekly digest update $(date -u '+%Y-%m-%d')"
          git pull --rebase origin main
          git push
